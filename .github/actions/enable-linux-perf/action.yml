name: Enable Linux perf
description: Enable Linux perf and strace for unprivileged measurement jobs.
runs:
  using: composite
  steps:
    - name: Install perf and strace
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install -y linux-tools-common linux-tools-generic strace
        sudo apt-get install -y "linux-tools-$(uname -r)" || sudo apt-get install -y linux-tools-azure || true

        path_perf_bin="$(command -v perf || true)"
        perf_bin="$path_perf_bin"
        if [[ -z "$perf_bin" ]] || ! "$perf_bin" --version; then
          perf_bin="$(find /usr/lib/linux-tools -type f -name perf 2>/dev/null | sort -V | tail -n 1 || true)"
        fi

        if [[ -z "$perf_bin" ]]; then
          echo "::error::No perf binary is available on this runner."
          exit 1
        fi

        if [[ "$perf_bin" != "$path_perf_bin" ]]; then
          sudo ln -sf "$perf_bin" /usr/local/bin/perf
          export PATH="/usr/local/bin:$PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          hash -r
        fi

        perf --version
        strace --version

    - name: Enable and verify perf counters
      shell: bash
      run: |
        set -euo pipefail

        print_sysctl() {
          local key="$1"
          local path="/proc/sys/${key//.//}"
          if [[ -r "$path" ]]; then
            echo "$key=$(cat "$path")"
          else
            echo "$key=<unavailable>"
          fi
        }

        set_sysctl_required() {
          local key="$1"
          local value="$2"
          sudo sysctl -w "$key=$value"
        }

        set_sysctl_optional() {
          local key="$1"
          local value="$2"
          if ! sudo sysctl -w "$key=$value"; then
            echo "::warning::Could not set $key=$value"
          fi
        }

        validate_perf_output() {
          local output="$1"
          local expected_count="$2"
          if [[ -z "${output//[[:space:]]/}" ]]; then
            return 1
          fi
          if grep -Eq '<not supported>|<not counted>|<not available>' <<< "$output"; then
            return 1
          fi
          local valid_count
          valid_count="$(
            awk -F, '
              /^[[:space:]]*#/ || /^[[:space:]]*$/ {
                next
              }
              NF >= 3 {
                value = $1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
                if (value ~ /^[0-9]+([.][0-9]+)?$/) {
                  valid += 1
                }
              }
              END {
                print valid + 0
              }
            ' <<< "$output"
          )"
          [[ "$valid_count" -ge "$expected_count" ]]
        }

        probe_events() {
          local events="$1"
          local expected_events
          IFS=, read -r -a expected_events <<< "$events"
          local output
          local status
          set +e
          output="$(perf stat --no-big-num -x , -e "$events" true 2>&1 >/dev/null)"
          status=$?
          set -e
          echo "Probe output for $events:"
          printf '%s\n' "$output"
          if [[ "$status" -ne 0 ]]; then
            return 1
          fi
          validate_perf_output "$output" "${#expected_events[@]}"
        }

        verify_perf_smoke_test() {
          local output_file="perf-smoke-test.txt"
          perf stat \
            -e task-clock,context-switches,cpu-migrations,page-faults \
            -o "$output_file" \
            -- sleep 0.1
          cat "$output_file"
        }

        verify_strace_smoke_test() {
          local output_file="strace-smoke-test.log"
          strace -qq -f -o "$output_file" -- sleep 0.1
          test -s "$output_file"
          head -n 20 "$output_file"
        }

        echo "Kernel:"
        uname -a
        echo "perf:"
        perf --version
        echo "Initial perf sysctls:"
        print_sysctl kernel.perf_event_paranoid
        print_sysctl kernel.nmi_watchdog
        print_sysctl kernel.kptr_restrict
        echo "CPU perf event source:"
        if [[ -d /sys/bus/event_source/devices/cpu ]]; then
          ls -ld /sys/bus/event_source/devices/cpu
          if [[ -r /sys/bus/event_source/devices/cpu/type ]]; then
            echo "cpu.type=$(cat /sys/bus/event_source/devices/cpu/type)"
          fi
        else
          echo "/sys/bus/event_source/devices/cpu=<unavailable>"
        fi

        set_sysctl_required kernel.perf_event_paranoid -1
        set_sysctl_optional kernel.nmi_watchdog 0
        set_sysctl_optional kernel.kptr_restrict 0

        echo "Updated perf sysctls:"
        print_sysctl kernel.perf_event_paranoid
        print_sysctl kernel.nmi_watchdog
        print_sysctl kernel.kptr_restrict

        echo "Verifying perf with software events:"
        verify_perf_smoke_test

        echo "Verifying strace:"
        verify_strace_smoke_test

        selected_events=""
        if probe_events "instructions:u,cycles:u"; then
          selected_events="instructions:u,cycles:u"
        elif probe_events "instructions,cycles"; then
          selected_events="instructions,cycles"
        elif probe_events "task-clock,context-switches,cpu-migrations,page-faults"; then
          selected_events="task-clock,context-switches,cpu-migrations,page-faults"
        else
          echo "::error::Linux perf counters are not available on this runner. Tried hardware and software perf events, but perf did not return numeric counts."
          exit 1
        fi

        echo "Selected perf events: $selected_events"
        echo "VSCODE_MEMORY_LEAK_FINDER_PERF_EVENTS=$selected_events" >> "$GITHUB_ENV"
